# Keeps GitHub Actions up to date. Our workflows pin actions to commit SHAs (not mutable
# tags) for supply-chain safety — see .github/workflows/pr-review.yml. Dependabot watches
# those pinned SHAs and opens a PR when a newer release exists, updating the SHA and the
# trailing "# vN" version comment together. This gives us reviewed updates instead of either
# silent tag drift or frozen-forever actions.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/" # scans all workflow files under .github/workflows/
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"
