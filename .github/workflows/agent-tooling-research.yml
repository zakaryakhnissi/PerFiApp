name: Agent Tooling Research

# Periodically (and on demand) have the `researcher` agent scout developments that could help
# PerFiApp's agent team, then open a PR with a dated research report for the team to review.
#
# ── Authentication ─────────────────────────────────────────────────────────────
# This needs an Anthropic credential. Two ways to provide it:
#   1. RECOMMENDED — add a repository secret named ANTHROPIC_API_KEY
#      (Settings -> Secrets and variables -> Actions, or `gh secret set ANTHROPIC_API_KEY`).
#      Works for scheduled AND manual runs, and the value never appears in logs.
#   2. Manual fallback — run the workflow from the Actions tab ("Run workflow") and paste a
#      key into the input below. Use this only if you cannot set a secret.
#      WARNING: a value typed into a workflow input is part of the run metadata and is NOT a
#      secret. We mask it from the logs, but treat the key as exposed and ROTATE it after the
#      run. Prefer option 1.
#
# If no credential is available (e.g. a scheduled run before a secret is set), the job SKIPS
# cleanly instead of failing.
#
# Each run uses Claude API tokens + GitHub Actions minutes (billed). PR creation also expects
# the Claude GitHub app: https://github.com/apps/claude

on:
  schedule:
    - cron: "0 13 * * 1" # every Monday at 13:00 UTC
  workflow_dispatch:
    inputs:
      anthropic_api_key:
        description: "Anthropic API key — used only if no ANTHROPIC_API_KEY secret exists. WARNING: visible in run metadata; rotate the key afterwards. Prefer setting the secret."
        required: false
        type: string

permissions:
  contents: write # create a branch and commit the report
  pull-requests: write # open the PR

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve Anthropic credential
        id: creds
        env:
          SECRET_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_KEY: ${{ inputs.anthropic_api_key }}
        run: |
          KEY="${SECRET_KEY:-$INPUT_KEY}"
          if [ -n "$KEY" ]; then
            echo "::add-mask::$KEY"
            echo "ANTHROPIC_API_KEY=$KEY" >> "$GITHUB_ENV"
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
            echo "No Anthropic credential found — skipping this run."
            echo "Add an ANTHROPIC_API_KEY repository secret (recommended), or run this"
            echo "workflow manually and paste a key into the input. See this file's header."
          fi

      - name: Checkout repository
        if: steps.creds.outputs.has_key == 'true'
        uses: actions/checkout@v4

      - name: Run research scout
        if: steps.creds.outputs.has_key == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # lets the agent use the gh CLI
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Use the `researcher` agent to run its full scan across its research tracks
            (agent tooling, AI cost/token optimization, model updates, agent evaluation,
            toolchain releases, AI/fintech security, and Canadian open-banking & compliance),
            within the context of this project. Rotate emphasis so the report stays focused,
            leading with whatever is most time-sensitive.

            Then:
            1. Determine today's date in YYYY-MM-DD form.
            2. Write the report to docs/research/agent-research-<date>.md, following the
               structure the researcher agent defines. Read existing files in docs/research/
               first and focus on what is new or changed since the last report.
            3. Create a branch named research/agent-research-<date>, commit only the new
               report, push it, and open a pull request to main titled
               "research: agent research scan <date>" that summarizes the top recommendations.
            Do not modify anything outside docs/research/.
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-6
            --allowedTools "Agent,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Bash"
