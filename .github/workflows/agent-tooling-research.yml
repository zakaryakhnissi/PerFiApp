name: Agent Tooling Research

# Periodically (and on demand) have the `researcher` agent scout developments that could help
# PerFiApp's agent team, then open a PR with a dated research report for the team to review.
#
# ── Authentication ─────────────────────────────────────────────────────────────
# This needs a Claude credential. Any ONE of these works (checked in this order):
#   1. CLAUDE_CODE_OAUTH_TOKEN secret — RECOMMENDED if you have Claude Pro/Max. Generate it
#      locally with `claude setup-token` and add it as a repo secret
#      (`gh secret set CLAUDE_CODE_OAUTH_TOKEN`). Usage draws on your subscription quota.
#   2. ANTHROPIC_API_KEY secret — pay-as-you-go API key from console.anthropic.com
#      (`gh secret set ANTHROPIC_API_KEY`). Best for heavy/predictable automation.
#   3. Manual API-key input (below) — run from the Actions tab and paste a key. Use only if
#      you can't set a secret. WARNING: a value typed into a workflow input is part of the run
#      metadata and is NOT a secret. We mask it from logs, but treat the key as exposed and
#      ROTATE it afterward.
#
# If no credential is available (e.g. a scheduled run before any secret is set), the job SKIPS
# cleanly instead of failing.
#
# Each run uses your Claude quota/tokens + GitHub Actions minutes. PR creation also expects the
# Claude GitHub app: https://github.com/apps/claude

on:
  schedule:
    - cron: "0 13 * * 1" # every Monday at 13:00 UTC
  workflow_dispatch:
    inputs:
      anthropic_api_key:
        description: "Anthropic API key — used only if no CLAUDE_CODE_OAUTH_TOKEN / ANTHROPIC_API_KEY secret exists. WARNING: visible in run metadata; rotate afterward. Prefer a secret."
        required: false
        type: string

permissions:
  contents: write # create a branch and commit the report
  pull-requests: write # open the PR

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve Claude credential
        id: creds
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SECRET_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INPUT_KEY: ${{ inputs.anthropic_api_key }}
        run: |
          API_KEY="${SECRET_KEY:-$INPUT_KEY}"
          if [ -n "$OAUTH_TOKEN" ]; then
            echo "::add-mask::$OAUTH_TOKEN"
            echo "CLAUDE_CODE_OAUTH_TOKEN=$OAUTH_TOKEN" >> "$GITHUB_ENV"
          fi
          if [ -n "$API_KEY" ]; then
            echo "::add-mask::$API_KEY"
            echo "ANTHROPIC_API_KEY=$API_KEY" >> "$GITHUB_ENV"
          fi
          if [ -n "$OAUTH_TOKEN" ] || [ -n "$API_KEY" ]; then
            echo "has_cred=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_cred=false" >> "$GITHUB_OUTPUT"
            echo "No Claude credential found — skipping this run."
            echo "Add a CLAUDE_CODE_OAUTH_TOKEN (Pro/Max) or ANTHROPIC_API_KEY repository"
            echo "secret, or run manually and paste an API key. See this file's header."
          fi

      - name: Checkout repository
        if: steps.creds.outputs.has_cred == 'true'
        uses: actions/checkout@v4

      - name: Run research scout
        if: steps.creds.outputs.has_cred == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # lets the agent use the gh CLI
        with:
          # Whichever was resolved above is used; the empty one is ignored.
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Use the `researcher` agent to run its full scan across its research tracks
            (agent tooling, AI cost/token optimization, model updates, agent evaluation,
            toolchain releases, AI/fintech security, and Canadian open-banking & compliance),
            within the context of this project. Rotate emphasis so the report stays focused,
            leading with whatever is most time-sensitive.

            Then:
            1. Determine today's date in YYYY-MM-DD form.
            2. Write the report to docs/research/agent-research-<date>.md, following the
               structure the researcher agent defines. Read existing files in docs/research/
               first and focus on what is new or changed since the last report.
            3. Create a branch named research/agent-research-<date>, commit only the new
               report, push it, and open a pull request to main titled
               "research: agent research scan <date>" that summarizes the top recommendations.
            Do not modify anything outside docs/research/.
          claude_args: |
            --max-turns 40
            --model claude-sonnet-4-6
            --allowedTools "Agent,Read,Write,Edit,Glob,Grep,WebSearch,WebFetch,Bash"
